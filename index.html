<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Speak your tasks, get a smart to-do list">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <title>To-Do Speak AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1><span class="accent">To-Do</span> Speak AI</h1>
      <button id="clearBtn" class="icon-btn" title="Clear completed tasks" aria-label="Clear completed tasks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
    </header>

    <div id="micSection">
      <div id="rippleContainer">
        <button id="micBtn" class="mic-btn" aria-label="Start voice recording">
          <svg id="micIcon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <div id="ripple1" class="ripple"></div>
        <div id="ripple2" class="ripple"></div>
        <div id="ripple3" class="ripple"></div>
      </div>
      <p id="statusText">Tap to speak</p>
      <p id="interimText" class="interim hidden"></p>
    </div>

    <div id="fallbackSection" class="hidden">
      <div class="input-row">
        <input type="text" id="textInput" placeholder="Type a task..." autocomplete="off">
        <button id="addBtn" class="btn-primary">Add</button>
      </div>
    </div>

    <div id="taskList"></div>

    <div id="emptyState">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
      </svg>
      <p>No tasks yet</p>
      <span>Tap the mic to get started</span>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
